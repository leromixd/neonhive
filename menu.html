<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RPG Dice Box: Custom Ranges</title>
    <style>
        :root {
            --gold: #ffcc00;
            --bg: #121212;
            --panel: #222;
            --red: #c0392b;
            --green: #27ae60;
        }

        body {
            background: var(--bg);
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .main-container {
            display: flex;
            gap: 20px;
            max-width: 1100px;
            width: 100%;
        }

        /* Настройка нового кубика */
        .sidebar {
            width: 280px;
            background: var(--panel);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #444;
            height: fit-content;
        }

        .sidebar h3 { color: var(--gold); margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        
        .range-inputs { display: flex; gap: 10px; }
        input, select {
            width: 100%; padding: 10px; background: #111; border: 1px solid #444;
            color: white; border-radius: 6px; outline: none;
        }
        input:focus { border-color: var(--gold); }

        .btn-add {
            width: 100%; padding: 12px; background: var(--green); color: white;
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        .btn-add:hover { background: #2ecc71; }

        /* Коробка с кубами */
        .dice-box {
            flex: 1;
            background: #000;
            border: 3px double #333;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 400px;
        }

        .collection {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            width: 100%;
            margin-bottom: 30px;
        }

        /* Кубик */
        .die {
            position: relative;
            width: 90px;
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            border-radius: 12px;
            border: 1px solid #444;
            transition: 0.2s;
        }

        .die svg { position: absolute; width: 100%; height: 100%; fill: #2c3e50; stroke: var(--gold); stroke-width: 2; opacity: 0.6; }
        .die .res-val { position: relative; z-index: 5; font-size: 24px; font-weight: bold; color: var(--gold); }
        .die .range-label { position: relative; z-index: 5; font-size: 10px; color: #888; margin-top: 2px; }

        .btn-del {
            position: absolute; top: -5px; right: -5px; width: 22px; height: 22px;
            background: var(--red); border: none; border-radius: 50%; color: white;
            cursor: pointer; font-size: 14px; line-height: 1; z-index: 10;
        }

        .btn-roll {
            width: 100%; padding: 20px; background: var(--gold); color: black;
            font-size: 22px; font-weight: bold; border: none; border-radius: 12px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-roll:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255, 204, 0, 0.4); }
        .btn-roll:disabled { background: #444; cursor: not-allowed; }

        /* История */
        .history {
            width: 240px;
            background: var(--panel);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #444;
        }

        .log { height: 300px; overflow-y: auto; list-style: none; padding: 0; margin: 15px 0; border-bottom: 1px solid #444; }
        .log-item { display: flex; justify-content: space-between; padding: 6px 0; font-family: monospace; font-size: 13px; border-bottom: 1px solid #333; }
        .total { text-align: center; font-size: 20px; font-weight: bold; color: var(--gold); }

        /* Анимации */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -1px) rotate(-2deg); }
            50% { transform: translate(1px, -1px) rotate(2deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .rolling { animation: shake 0.1s infinite; }
    </style>
</head>
<body>

<div class="main-container">
    <!-- Настройки -->
    <div class="sidebar">
        <h3>+ Новый кубик</h3>
        
        <div class="input-group">
            <label>Диапазон чисел</label>
            <div class="range-inputs">
                <input type="number" id="min-val" value="1" placeholder="От">
                <input type="number" id="max-val" value="20" placeholder="До">
            </div>
        </div>

        <div class="input-group">
            <label>Форма</label>
            <select id="shape-sel">
                <option value="4">Пирамида (d4)</option>
                <option value="6">Куб (d6)</option>
                <option value="8">Алмаз (d8)</option>
                <option value="10">Ромб (d10)</option>
                <option value="20">Гексагон (d20)</option>
                <option value="100">Круг (d100)</option>
            </select>
        </div>

        <button class="btn-add" onclick="createDie()">ДОБАВИТЬ В КОРОБКУ</button>
        <p id="error-msg" style="color:var(--red); font-size:11px; display:none;">Ошибка: Минимум должен быть меньше максимума!</p>
    </div>

    <!-- Коробка -->
    <div class="dice-box">
        <h2 style="margin-top:0;">Коробка с кубами</h2>
        <div id="collection" class="collection">
            <div style="color:#444; margin-top:50px;">Коробка пуста...</div>
        </div>
        <button id="roll-btn" class="btn-roll" onclick="rollEverything()" disabled>БРОСИТЬ ВСЁ</button>
    </div>

    <!-- История -->
    <div class="history">
        <strong>ИСТОРИЯ</strong>
        <ul id="log" class="log"></ul>
        <div class="total">ИТОГО: <span id="sum">0</span></div>
        <button onclick="fullReset()" style="width:100%; margin-top:10px; background:none; border:1px solid #444; color:#666; cursor:pointer;">Сброс</button>
    </div>
</div>

<script>
    const svgPaths = {
        4: 'M 50,5 L 95,90 L 5,90 Z',
        6: 'M 15,15 H 85 V 85 H 15 Z',
        8: 'M 50,5 L 90,50 L 50,95 L 10,50 Z M 10,50 L 90,50 M 50,5 L 50,95',
        10: 'M 50,5 L 90,45 L 50,95 L 10,45 Z',
        20: 'M 50,5 L 90,25 L 90,75 L 50,95 L 10,75 L 10,25 Z',
        100: 'M 50,50 m -45,0 a 45,45 0 1,0 90,0 a 45,45 0 1,0 -90,0'
    };

    let diceList = [];
    let globalSum = 0;
    let isRolling = false;

    function createDie() {
        const min = parseInt(document.getElementById('min-val').value);
        const max = parseInt(document.getElementById('max-val').value);
        const shape = document.getElementById('shape-sel').value;
        const errMsg = document.getElementById('error-msg');

        if (isNaN(min) || isNaN(max) || min >= max) {
            errMsg.style.display = 'block';
            return;
        }
        
        errMsg.style.display = 'none';
        diceList.push({ min, max, shape, current: '?' });
        refreshUI();
    }

    function removeDie(idx) {
        if (isRolling) return;
        diceList.splice(idx, 1);
        refreshUI();
    }

    function refreshUI() {
        const container = document.getElementById('collection');
        const rollBtn = document.getElementById('roll-btn');
        container.innerHTML = '';

        if (diceList.length === 0) {
            container.innerHTML = '<div style="color:#444; margin-top:50px;">Коробка пуста...</div>';
            rollBtn.disabled = true;
            return;
        }

        rollBtn.disabled = false;
        diceList.forEach((die, i) => {
            const el = document.createElement('div');
            el.className = 'die';
            el.id = `die-${i}`;
            el.innerHTML = `
                <button class="btn-del" onclick="removeDie(${i})">×</button>
                <svg viewBox="0 0 100 100"><path d="${svgPaths[die.shape]}" /></svg>
                <div class="res-val" id="val-${i}">${die.current}</div>
                <div class="range-label">${die.min}—${die.max}</div>
            `;
            container.appendChild(el);
        });
    }

    function rollEverything() {
        if (isRolling || diceList.length === 0) return;
        isRolling = true;
        document.getElementById('roll-btn').disabled = true;

        // Визуальная тряска
        diceList.forEach((_, i) => document.getElementById(`die-${i}`).classList.add('rolling'));

        let frames = 0;
        const interval = setInterval(() => {
            diceList.forEach((die, i) => {
                document.getElementById(`val-${i}`).innerText = 
                    Math.floor(Math.random() * (die.max - die.min + 1)) + die.min;
            });
            frames++;
            if (frames > 15) {
                clearInterval(interval);
                finalize();
            }
        }, 60);
    }

    function finalize() {
        let rollSum = 0;
        diceList.forEach((die, i) => {
            const res = Math.floor(Math.random() * (die.max - die.min + 1)) + die.min;
            die.current = res;
            rollSum += res;
            
            const el = document.getElementById(`die-${i}`);
            el.classList.remove('rolling');
            document.getElementById(`val-${i}`).innerText = res;
        });

        globalSum += rollSum;
        document.getElementById('sum').innerText = globalSum;

        // Лог
        const li = document.createElement('li');
        li.className = 'log-item';
        li.innerHTML = `<span>Бросок (${diceList.length} шт.)</span> <span>+${rollSum}</span>`;
        document.getElementById('log').prepend(li);

        isRolling = false;
        document.getElementById('roll-btn').disabled = false;
    }

    function fullReset() {
        diceList = [];
        globalSum = 0;
        document.getElementById('sum').innerText = "0";
        document.getElementById('log').innerHTML = "";
        refreshUI();
    }
</script>

</body>
</html>
